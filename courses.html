<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses | Mentors' Noakhali Branch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="Media/favicon.ico" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <!-- Navbar injected by js/components.js -->
    </nav>

    <!-- Page Hero -->
    <div class="page-hero">
      <!-- Injected by js/courses.js -->
    </div>

    <!-- Page Content -->
    <section class="section-padding" style="background: var(--bg-light)">
      <div class="container">
        <div class="courses-grid">
          <!-- Injected by js/courses.js -->
          <div style="text-align: center; padding: 50px">
            <p style="color: var(--text-muted)">Loading courses...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- English Skill Assessment Teaser -->
    <section
      id="assessment-section"
      class="section-padding"
      style="
        background: var(--surface);
        border-top: 1px solid var(--border-color);
      "
    >
      <div
        class="container"
        style="max-width: 700px; margin: auto; text-align: center"
      >
        <div
          style="
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 26, 26, 0.08);
            border: 1px solid rgba(255, 26, 26, 0.25);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 14px;
            border-radius: 30px;
            margin-bottom: 18px;
          "
        >
          Free Diagnostic Tool
        </div>
        <h2
          style="font-size: 2rem; margin-bottom: 12px; color: var(--text-main)"
        >
          Not Sure Which Course to Take?
        </h2>
        <p
          style="
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 28px;
          "
        >
          Take our free 20-question English Skill Assessment (30 min) and get a
          personalised course recommendation — Reading &amp; Grammar, scored
          instantly.
        </p>
        <div
          style="
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
          "
        >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 7px;
              background: var(--surface-2);
              border: 1px solid var(--border-color);
              padding: 8px 18px;
              border-radius: 30px;
              font-size: 0.9rem;
              font-weight: 600;
              color: var(--text-main);
            "
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            30 Minutes
          </div>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 7px;
              background: var(--surface-2);
              border: 1px solid var(--border-color);
              padding: 8px 18px;
              border-radius: 30px;
              font-size: 0.9rem;
              font-weight: 600;
              color: var(--text-main);
            "
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M14 2H6a2 2 0 0 0-2 2v16h16V8z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            20 Questions
          </div>
          <div
            style="
              display: flex;
              align-items: center;
              gap: 7px;
              background: var(--surface-2);
              border: 1px solid var(--border-color);
              padding: 8px 18px;
              border-radius: 30px;
              font-size: 0.9rem;
              font-weight: 600;
              color: var(--text-main);
            "
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              />
            </svg>
            Instant Results
          </div>
        </div>
        <a
          href="english-assessment.html"
          target="_blank"
          class="btn btn-primary"
          style="
            font-size: 1.05rem;
            padding: 14px 36px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
          "
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          Start Free Assessment
        </a>
      </div>
    </section>

    <!-- Free Resources Section -->
    <div id="free-resources-root">
      <!-- Injected by js/courses.js using renderFreeResources -->
    </div>

    <!-- Footer -->
    <footer class="footer"></footer>

    <!-- Floating Action Buttons -->
    <div class="floating-action-group"></div>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/common-render.js"></script>
    <script src="js/courses-data.js"></script>
    <script src="js/courses-render.js"></script>
    <script src="js/seo.js"></script>
  </body>
</html>
