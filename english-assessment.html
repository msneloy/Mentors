<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>English Skill Assessment | Mentors' Noakhali Branch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="Media/favicon.ico" />
    <style>
      :root {
        --bg: #0f1117;
        --s: #16181f;
        --s2: #1d2028;
        --s3: #252834;
        --ac: #ff1a1a;
        --ac2: #ff4444;
        --t: #e8eaf0;
        --m: #8b92a4;
        --br: #2d3045;
        --gn: #22c55e;
        --yw: #fbbf24;
        --or: #f59e0b;
        --rd: #ef4444;
        --hl: rgba(251, 191, 36, 0.28);
        --hlb: rgba(251, 191, 36, 0.65);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--t);
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font-family: "Inter", sans-serif;
      }

      /* ── INTRO ──────────────────────────────────────────────── */
      .intro {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        overflow-y: auto;
        background:
          radial-gradient(
            ellipse at 50% 0%,
            rgba(255, 26, 26, 0.1) 0%,
            transparent 60%
          ),
          var(--bg);
      }

      .intro-brand {
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: var(--m);
        margin-bottom: 28px;
      }

      .intro-brand strong {
        color: var(--ac);
      }

      .intro-card {
        background: var(--s);
        border: 1px solid var(--br);
        border-top: 3px solid var(--ac);
        border-radius: 16px;
        padding: 40px 48px;
        max-width: 640px;
        width: 100%;
        text-align: center;
      }

      .intro-card h1 {
        font-family: "Outfit", sans-serif;
        font-size: 1.9rem;
        margin-bottom: 6px;
      }

      .intro-card h1 em {
        color: var(--ac);
        font-style: normal;
      }

      .intro-sub {
        color: var(--m);
        font-size: 0.95rem;
        margin-bottom: 22px;
      }

      .meta-row {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }

      .meta-pill {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--s2);
        border: 1px solid var(--br);
        padding: 7px 16px;
        border-radius: 30px;
        font-size: 0.88rem;
        font-weight: 600;
      }

      .meta-pill svg {
        color: var(--ac);
      }

      .intro-rules {
        background: var(--s2);
        border: 1px solid var(--br);
        border-radius: 12px;
        padding: 16px 20px;
        text-align: left;
        margin-bottom: 24px;
      }

      .intro-rules h3 {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--m);
        margin-bottom: 10px;
      }

      .intro-rules li {
        list-style: none;
        color: var(--m);
        font-size: 0.88rem;
        line-height: 1.8;
        padding-left: 14px;
        position: relative;
      }

      .intro-rules li::before {
        content: "›";
        position: absolute;
        left: 0;
        color: var(--ac);
        font-weight: 700;
      }

      .btn-start {
        background: var(--ac);
        color: #fff;
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        padding: 14px 36px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-start:hover {
        background: var(--ac2);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(255, 26, 26, 0.35);
      }

      /* ── EXAM LAYOUT ─────────────────────────────────────────── */
      .exam {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Topbar */
      .topbar {
        flex-shrink: 0;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: var(--s);
        border-bottom: 1px solid var(--br);
      }

      .topbar-brand {
        font-family: "Outfit", sans-serif;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .topbar-brand span {
        color: var(--ac);
      }

      .sec-tabs {
        display: flex;
        gap: 6px;
      }

      .sec-tab {
        font-size: 0.78rem;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 6px;
        border: 1px solid var(--br);
        background: var(--s2);
        color: var(--m);
      }

      .sec-tab.on {
        background: rgba(255, 26, 26, 0.1);
        border-color: rgba(255, 26, 26, 0.3);
        color: var(--ac);
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .timer {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: "Outfit", sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--gn);
        background: rgba(34, 197, 94, 0.08);
        border: 1px solid rgba(34, 197, 94, 0.2);
        padding: 5px 13px;
        border-radius: 8px;
        transition: all 0.3s;
        min-width: 100px;
        justify-content: center;
      }

      .timer.warn {
        color: var(--or);
        background: rgba(245, 158, 11, 0.08);
        border-color: rgba(245, 158, 11, 0.25);
      }

      .timer.danger {
        color: var(--rd);
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
        animation: tpulse 1s infinite;
      }

      @keyframes tpulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.04);
        }
      }

      .btn-submit {
        background: var(--ac);
        color: #fff;
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        padding: 7px 16px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-submit:hover {
        background: var(--ac2);
      }

      /* Q-Nav */
      .qnav {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 18px;
        background: var(--s2);
        border-bottom: 1px solid var(--br);
        overflow-x: auto;
      }

      .qnav::-webkit-scrollbar {
        height: 2px;
      }

      .qnav::-webkit-scrollbar-thumb {
        background: var(--ac);
        border-radius: 1px;
      }

      .qnav-label {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--m);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
        margin-right: 2px;
      }

      .qnav-sep {
        width: 1px;
        height: 20px;
        background: var(--br);
        flex-shrink: 0;
        margin: 0 4px;
      }

      .qchip {
        width: 28px;
        height: 28px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 700;
        cursor: pointer;
        border: 1.5px solid transparent;
        flex-shrink: 0;
        background: #2a2d3a;
        color: var(--m);
        transition: all 0.15s;
      }

      .qchip:hover {
        border-color: var(--ac);
        color: var(--t);
      }

      .qchip.done {
        background: rgba(34, 197, 94, 0.12);
        color: var(--gn);
        border-color: rgba(34, 197, 94, 0.2);
      }

      .qchip.cur {
        background: var(--ac);
        color: #fff;
        border-color: var(--ac);
        box-shadow: 0 0 8px rgba(255, 26, 26, 0.4);
      }

      /* Body */
      .exam-body {
        flex: 1;
        overflow: hidden;
        display: flex;
      }

      /* Reading layout */
      .reading-layout {
        display: grid;
        grid-template-columns: 52% 48%;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Grammar layout */
      .grammar-layout {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow-y: auto;
        padding: 30px 20px;
      }

      .grammar-layout::-webkit-scrollbar {
        width: 4px;
      }

      .grammar-layout::-webkit-scrollbar-thumb {
        background: var(--ac);
        border-radius: 2px;
      }

      .grammar-inner {
        width: 100%;
        max-width: 680px;
      }

      /* Passage panel */
      .pane-passage {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-right: 2px solid var(--br);
        background: var(--s2);
      }

      .pane-bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: var(--s3);
        border-bottom: 1px solid var(--br);
      }

      .pane-bar-title {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--m);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .pane-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hl-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        border: 1px solid var(--br);
        background: var(--s2);
        color: var(--m);
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .hl-btn:hover,
      .hl-btn.on {
        border-color: rgba(251, 191, 36, 0.45);
        color: var(--yw);
        background: rgba(251, 191, 36, 0.08);
      }

      .hl-hint {
        font-size: 0.68rem;
        color: var(--m);
        font-style: italic;
      }

      .pane-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 22px 26px;
        line-height: 1.9;
        font-size: 0.94rem;
        cursor: default;
      }

      .pane-scroll::-webkit-scrollbar {
        width: 4px;
      }

      .pane-scroll::-webkit-scrollbar-thumb {
        background: var(--ac);
        border-radius: 2px;
      }

      .pane-scroll h3 {
        font-family: "Outfit", sans-serif;
        font-size: 1.1rem;
        margin-bottom: 14px;
        color: var(--t);
      }

      .pane-scroll p {
        margin-bottom: 12px;
        color: #c5c9d6;
      }

      mark.hl {
        background: var(--hl);
        border-radius: 2px;
        cursor: pointer;
        border-bottom: 2px solid var(--hlb);
        padding: 0 1px;
        transition: background 0.15s;
        color: inherit;
      }

      mark.hl:hover {
        background: rgba(251, 191, 36, 0.48);
      }

      /* Question panel */
      .pane-q {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }

      .pane-q-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 24px 26px;
      }

      .pane-q-scroll::-webkit-scrollbar {
        width: 4px;
      }

      .pane-q-scroll::-webkit-scrollbar-thumb {
        background: var(--ac);
        border-radius: 2px;
      }

      .sec-badge {
        display: inline-block;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: rgba(255, 26, 26, 0.1);
        color: var(--ac);
        padding: 3px 9px;
        border-radius: 4px;
        margin-bottom: 11px;
        border: 1px solid rgba(255, 26, 26, 0.2);
      }

      .q-text {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--t);
        line-height: 1.55;
        margin-bottom: 20px;
      }

      .opts {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .opt {
        display: flex;
        align-items: center;
        gap: 11px;
        background: var(--s2);
        border: 1.5px solid var(--br);
        border-radius: 10px;
        padding: 11px 14px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .opt:hover {
        border-color: var(--ac);
        background: rgba(255, 26, 26, 0.03);
      }

      .opt.sel {
        border-color: var(--ac);
        background: rgba(255, 26, 26, 0.08);
        box-shadow: 0 0 8px rgba(255, 26, 26, 0.1);
      }

      .opt-ltr {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid var(--br);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--m);
        flex-shrink: 0;
        transition: all 0.15s;
      }

      .opt:hover .opt-ltr {
        border-color: var(--ac);
        color: var(--ac);
      }

      .opt.sel .opt-ltr {
        background: var(--ac);
        border-color: var(--ac);
        color: #fff;
      }

      .opt-txt {
        font-size: 0.92rem;
        color: var(--t);
        line-height: 1.4;
      }

      .txt-inp {
        width: 100%;
        background: var(--s2);
        border: 1.5px solid var(--br);
        color: var(--t);
        border-radius: 10px;
        padding: 13px 16px;
        font-size: 0.98rem;
        font-family: inherit;
        transition: all 0.15s;
      }

      .txt-inp:focus {
        outline: none;
        border-color: var(--ac);
        box-shadow: 0 0 10px rgba(255, 26, 26, 0.14);
      }

      .txt-inp::placeholder {
        color: var(--m);
      }

      /* Footer nav */
      .q-footer {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 26px;
        background: var(--s);
        border-top: 1px solid var(--br);
      }

      .q-footer-info {
        font-size: 0.85rem;
        color: var(--m);
      }

      .btn-nav {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--s2);
        border: 1px solid var(--br);
        color: var(--t);
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 7px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-nav:hover:not(:disabled) {
        border-color: var(--ac);
        color: var(--ac);
      }

      .btn-nav:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .btn-nav-p {
        background: var(--ac);
        color: #fff;
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        padding: 7px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .btn-nav-p:hover {
        background: var(--ac2);
      }

      /* ── RESULTS ─────────────────────────────────────────────── */
      .results-wrap {
        flex: 1;
        overflow-y: auto;
        display: flex;
        justify-content: center;
        padding: 36px 20px;
      }

      .results-wrap::-webkit-scrollbar {
        width: 5px;
      }

      .results-wrap::-webkit-scrollbar-thumb {
        background: var(--ac);
        border-radius: 3px;
      }

      .results-card {
        background: var(--s);
        border: 1px solid var(--br);
        border-radius: 16px;
        padding: 40px 48px;
        max-width: 700px;
        width: 100%;
        text-align: center;
      }

      .results-card h2 {
        font-family: "Outfit", sans-serif;
        font-size: 1.9rem;
        margin-bottom: 22px;
      }

      .ring-wrap {
        position: relative;
        width: 170px;
        height: 170px;
        margin: 0 auto 26px;
      }

      .ring-wrap svg {
        transform: rotate(-90deg);
      }

      .ring-bg {
        fill: none;
        stroke: var(--s2);
        stroke-width: 14;
      }

      .ring-fill {
        fill: none;
        stroke: var(--ac);
        stroke-width: 14;
        stroke-linecap: round;
        stroke-dasharray: 476;
        stroke-dashoffset: 476;
        transition: stroke-dashoffset 1.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .ring-label {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .ring-score {
        font-size: 2.5rem;
        font-weight: 800;
        font-family: "Outfit", sans-serif;
      }

      .ring-total {
        font-size: 0.75rem;
        color: var(--m);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .rec-card {
        background: linear-gradient(
          135deg,
          rgba(255, 26, 26, 0.07),
          rgba(255, 26, 26, 0.02)
        );
        border: 1.5px dashed rgba(255, 26, 26, 0.35);
        border-radius: 14px;
        padding: 24px;
        margin: 0 auto 26px;
        max-width: 560px;
      }

      .rec-badge {
        display: inline-block;
        background: var(--ac);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 3px 12px;
        border-radius: 30px;
        margin-bottom: 10px;
      }

      .rec-title {
        font-family: "Outfit", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .rec-desc {
        font-size: 0.93rem;
        color: var(--m);
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .results-btns {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .btn-r {
        background: var(--s2);
        border: 1px solid var(--br);
        color: var(--t);
        font-family: "Outfit", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        padding: 9px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-r:hover {
        border-color: var(--ac);
        color: var(--ac);
      }

      .btn-rp {
        background: var(--ac);
        color: #fff;
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 0.88rem;
        font-weight: 700;
        padding: 9px 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-block;
      }

      .btn-rp:hover {
        background: var(--ac2);
      }

      /* Review */
      .review-sec {
        text-align: left;
        margin-top: 26px;
        border-top: 1px solid var(--br);
        padding-top: 22px;
      }

      .review-sec h3 {
        font-family: "Outfit", sans-serif;
        font-size: 1.2rem;
        margin-bottom: 16px;
      }

      .rq {
        background: var(--s2);
        border: 1px solid var(--br);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 12px;
        text-align: left;
      }

      .rq-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
        gap: 6px;
      }

      .rq-num {
        font-weight: 700;
        font-size: 0.88rem;
      }

      .rq-badge {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 4px;
      }

      .rq-badge.ok {
        background: rgba(34, 197, 94, 0.12);
        color: var(--gn);
        border: 1px solid rgba(34, 197, 94, 0.2);
      }

      .rq-badge.no {
        background: rgba(239, 68, 68, 0.12);
        color: var(--rd);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .rq-q {
        font-size: 0.93rem;
        font-weight: 500;
        color: var(--t);
        margin-bottom: 10px;
        line-height: 1.5;
      }

      .rq-ans-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }

      .rq-ans {
        background: var(--s);
        border: 1px solid var(--br);
        border-radius: 8px;
        padding: 10px 14px;
      }

      .rq-ans-label {
        font-size: 0.65rem;
        color: var(--m);
        text-transform: uppercase;
        margin-bottom: 3px;
      }

      .rq-ans-val {
        font-size: 0.88rem;
        font-weight: 600;
      }

      .rq-exp {
        background: rgba(255, 26, 26, 0.03);
        border-left: 3px solid var(--ac);
        padding: 10px 14px;
        border-radius: 0 8px 8px 0;
        font-size: 0.88rem;
        color: var(--m);
        line-height: 1.5;
      }

      /* Confirm overlay */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .overlay-card {
        background: var(--s);
        border: 1px solid var(--br);
        border-top: 3px solid var(--ac);
        border-radius: 14px;
        padding: 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }

      .overlay-card h3 {
        font-family: "Outfit", sans-serif;
        font-size: 1.3rem;
        margin-bottom: 10px;
      }

      .overlay-card p {
        color: var(--m);
        font-size: 0.93rem;
        margin-bottom: 22px;
        line-height: 1.5;
      }

      .overlay-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      /* Timeout banner */
      .timeout-banner {
        text-align: center;
        color: var(--rd);
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 14px;
      }

      /* Responsive */
      @media (max-width: 800px) {
        html, body {
          overflow-y: auto;
          height: auto;
        }

        .exam {
          height: auto;
          min-height: 100vh;
          overflow-y: visible;
        }

        .reading-layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto;
          height: auto;
        }

        .pane-passage {
          border-right: none;
          border-bottom: 2px solid var(--br);
          height: 45vh; /* Give passage some fixed height but scrollable */
        }

        .pane-q {
          height: auto;
        }

        .grammar-layout {
          height: auto;
          padding: 20px 15px;
        }

        .intro-card {
          padding: 28px 24px;
        }

        .results-card {
          padding: 28px 20px;
        }

        .rq-ans-grid {
          grid-template-columns: 1fr;
        }

        .qnav {
          padding: 10px 18px;
          flex-wrap: nowrap;
          justify-content: flex-start;
        }

        .topbar {
          flex-direction: column;
          height: auto;
          padding: 10px;
          gap: 10px;
        }

        .topbar-right {
          width: 100%;
          justify-content: space-between;
        }
      }

      @media (max-width: 480px) {
        .intro-card h1 {
          font-size: 1.5rem;
        }
        .meta-pill {
          font-size: 0.75rem;
          padding: 5px 12px;
        }
        .qchip {
          width: 32px;
          height: 32px;
        }
      }
