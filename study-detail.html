<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Apply to top universities worldwide directly from Mentors' Noakhali. Transparent, reliable study abroad counseling & visa help.">
    <title>Study Abroad Details | Mentors' Noakhali</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="Media/favicon.ico">
</head>

<body>
    <nav class="navbar">
        <!-- Navbar injected by js/components.js -->
    </nav>

    <!-- Content Root -->
    <div id="study-detail-root">
        <!-- JS will inject content here -->
        <div style="text-align:center; padding:100px 20px;">
            <div class="spinner"
                style="border: 4px solid rgba(0,0,0,0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;">
            </div>
            <p style="color:var(--text-muted)">Loading country details...</p>
        </div>
    </div>

    <footer class="footer">
        <!-- Footer injected by js/components.js -->
    </footer>

    <div class="floating-action-group">
        <!-- Buttons injected by js/components.js -->
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Scripts -->
    <script src="js/components.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/study-data.js"></script>
    <script src="js/study-abroad.js"></script>
</body>

</html>
